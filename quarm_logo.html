<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QUARM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  #out {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 80vw;
    max-height: 70vh;
    object-fit: contain;
  }
  .sub {
    font-family: 'Cinzel Decorative', Georgia, serif;
    color: #6b5020;
    letter-spacing: 0.5em;
    font-size: 11px;
    margin-top: 18px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="out"></canvas>
<div class="sub">Multi-Agent Orchestrator</div>
<script>
const PX = 4;
const TEXT = 'QUARM';
const FONT = '"Cinzel Decorative", Georgia, serif';

function go() {
  // ── 1. Measure at hi-res, render, downsample ──
  const S = 3; // render scale
  const fs = 42 * S;
  const font = `900 ${fs}px ${FONT}`;

  const m = document.createElement('canvas').getContext('2d');
  m.font = font;
  try { m.letterSpacing = `${3*S}px`; } catch(_){}
  const tw = m.measureText(TEXT).width;

  const pad = 8 * S;
  const RW = Math.ceil(tw + pad * 4);
  const RH = Math.ceil(fs * 1.5 + pad * 3);
  const AW = Math.ceil(RW / S);
  const AH = Math.ceil(RH / S);

  // Hi-res offscreen
  const off = document.createElement('canvas');
  off.width = RW; off.height = RH;
  const c = off.getContext('2d');
  c.font = font; c.textAlign = 'center'; c.textBaseline = 'middle';
  try { c.letterSpacing = `${3*S}px`; } catch(_){}
  const cx = RW/2, cy = RH/2;

  c.save();
  c.transform(1, 0, -0.06, 1, RW*0.03, 0);

  const g = c.createLinearGradient(0, cy-fs*0.48, 0, cy+fs*0.48);
  g.addColorStop(0,'#FFFCE8'); g.addColorStop(.06,'#FFE898');
  g.addColorStop(.2,'#F0C840'); g.addColorStop(.4,'#D09C28');
  g.addColorStop(.58,'#A87818'); g.addColorStop(.76,'#785010');
  g.addColorStop(.92,'#50340C'); g.addColorStop(1,'#382008');

  // Shadow layers
  for (let d=6;d>=3;d--) { c.globalAlpha=.3; c.fillStyle='#000'; c.fillText(TEXT,cx+d*S,cy+d*S); }
  c.globalAlpha=.9; c.fillStyle='#1c0f00'; c.fillText(TEXT,cx+2*S,cy+2*S);
  c.globalAlpha=1;  c.fillStyle='#2a1600'; c.fillText(TEXT,cx+S,cy+S);
  c.fillStyle=g;    c.fillText(TEXT,cx,cy);

  // Highlight inside letters
  c.globalCompositeOperation='source-atop';
  const hi=c.createLinearGradient(0,cy-fs*.48,0,cy-fs*.05);
  hi.addColorStop(0,'rgba(255,252,235,0.55)'); hi.addColorStop(1,'rgba(255,230,160,0)');
  c.fillStyle=hi; c.fillRect(0,0,RW,RH);
  c.globalCompositeOperation='source-over';

  c.globalCompositeOperation='lighter'; c.globalAlpha=.18; c.fillStyle='#FFE8A0';
  c.fillText(TEXT,cx-.6*S,cy-.6*S);
  c.globalAlpha=1; c.globalCompositeOperation='source-over';
  c.restore();

  // ── 2. Downsample ──
  const ds = document.createElement('canvas');
  ds.width=AW; ds.height=AH;
  const dc=ds.getContext('2d');
  dc.imageSmoothingEnabled=true; dc.imageSmoothingQuality='high';
  dc.drawImage(off,0,0,AW,AH);
  const src=dc.getImageData(0,0,AW,AH).data;

  // ── 3. Bevel ──
  const px=new Uint8ClampedArray(src);
  for(let y=1;y<AH-1;y++) for(let x=1;x<AW-1;x++){
    const i=(y*AW+x)*4; if(src[i+3]<18) continue;
    let bv=0;
    if(src[((y-1)*AW+x)*4+3]<18)   bv+=.35;
    if(src[(y*AW+x-1)*4+3]<18)     bv+=.25;
    if(src[((y-1)*AW+x-1)*4+3]<18) bv+=.18;
    if(src[((y+1)*AW+x)*4+3]<18)   bv-=.25;
    if(src[(y*AW+x+1)*4+3]<18)     bv-=.18;
    if(src[((y+1)*AW+x+1)*4+3]<18) bv-=.12;
    bv=Math.max(-.45,Math.min(.55,bv));
    if(bv>0){px[i]=Math.min(255,src[i]+bv*200);px[i+1]=Math.min(255,src[i+1]+bv*170);px[i+2]=Math.min(255,src[i+2]+bv*90);}
    else if(bv<0){px[i]=Math.max(0,src[i]+bv*130);px[i+1]=Math.max(0,src[i+1]+bv*110);px[i+2]=Math.max(0,src[i+2]+bv*70);}
  }

  // ── 4. Draw once as a static pixelated image ──
  const out = document.getElementById('out');
  out.width = AW * PX;
  out.height = AH * PX;
  const oc = out.getContext('2d');

  // Build ImageData in one pass
  const img = oc.createImageData(AW*PX, AH*PX);
  const d = img.data;
  for(let ay=0;ay<AH;ay++) for(let ax=0;ax<AW;ax++){
    const si=(ay*AW+ax)*4;
    if(px[si+3]<10) continue;
    for(let py=0;py<PX;py++) for(let ppx=0;ppx<PX;ppx++){
      const di=((ay*PX+py)*(AW*PX)+(ax*PX+ppx))*4;
      d[di]=px[si]; d[di+1]=px[si+1]; d[di+2]=px[si+2]; d[di+3]=px[si+3];
    }
  }
  oc.putImageData(img,0,0);
}

if(document.fonts) document.fonts.ready.then(()=>setTimeout(go,200));
else window.addEventListener('load',()=>setTimeout(go,400));
</script>
</body>
</html>
